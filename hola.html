<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regla de Backup 3-2-1</title>
    
    <!-- Configuración de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        red321: '#C0392B',
                        black: '#000000',
                        white: '#FFFFFF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Fuentes y Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
        }
        
        /* Efecto sutil de hover para profesionalismo */
        .card:hover .icon-container {
            transform: translateY(-5px);
        }
        .icon-container {
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 sm:p-12">

    <!-- Encabezado opcional para contexto -->
    <header class="mb-16 text-center">
        <h1 class="text-sm tracking-[0.3em] text-gray-400 uppercase font-semibold">Estrategia de Respaldo</h1>
        <div class="text-4xl md:text-5xl font-black mt-2">REGLA <span class="text-red321">3-2-1</span></div>
    </header>

    <!-- Contenedor Principal (Grid de 3 columnas) -->
    <main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8">
        
        <!-- Columna 1 -->
        <article class="card flex flex-col items-center text-center group">
            <div class="text-[10rem] md:text-[12rem] font-black text-red321 leading-none select-none">3</div>
            <div class="icon-container h-24 flex items-center justify-center mt-4 mb-6">
                <i class="fa-solid fa-copy text-5xl md:text-6xl text-white"></i>
            </div>
            <h2 class="text-xl md:text-2xl font-bold uppercase tracking-wider text-white w-full border-t border-gray-800 pt-6">
                Copias de datos
            </h2>
        </article>

        <!-- Columna 2 -->
        <article class="card flex flex-col items-center text-center group">
            <div class="text-[10rem] md:text-[12rem] font-black text-red321 leading-none select-none">2</div>
            <div class="icon-container h-24 flex items-center justify-center mt-4 mb-6 gap-6">
                <i class="fa-solid fa-server text-5xl md:text-6xl text-white"></i>
                <i class="fa-solid fa-hdd text-5xl md:text-6xl text-white"></i>
            </div>
            <h2 class="text-xl md:text-2xl font-bold uppercase tracking-wider text-white w-full border-t border-gray-800 pt-6">
                Medios diferentes
            </h2>
        </article>

        <!-- Columna 3 -->
        <article class="card flex flex-col items-center text-center group">
            <div class="text-[10rem] md:text-[12rem] font-black text-red321 leading-none select-none">1</div>
            <div class="icon-container h-24 flex items-center justify-center mt-4 mb-6">
                <!-- fa-cloud-arrow-up es el equivalente moderno de fa-cloud-upload-alt en FontAwesome 6 -->
                <i class="fa-solid fa-cloud-arrow-up text-5xl md:text-6xl text-white"></i>
            </div>
            <h2 class="text-xl md:text-2xl font-bold uppercase tracking-wider text-white w-full border-t border-gray-800 pt-6">
                Copia offsite/offline
            </h2>
        </article>

    </main>

</body>
</html>
