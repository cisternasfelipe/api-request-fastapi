<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentBuilder</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: #dde3f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Card wrapper ── */
        #app {
            width: 95vw;
            height: 92vh;
            background: white;
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px;
            background: #f9f9fb;
            border-right: 1px solid #ebebf0;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 16px;
            flex-shrink: 0;
        }

        #sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111;
            padding: 4px 8px;
        }

        #new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #5b5fc7;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #new-chat-btn:hover { background: #4a4eb8; }

        .sidebar-section-label {
            font-size: 0.75rem;
            color: #aaa;
            font-weight: 500;
            padding: 0 8px;
            margin-top: 8px;
        }

        #history-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
            flex: 1;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #444;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: #ebebf5; }
        .history-item.active { background: #eeeeff; color: #5b5fc7; font-weight: 600; }

        .history-item svg { flex-shrink: 0; opacity: 0.5; }

        /* ── Main chat ── */
        #chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* ── Navbar ── */
        #navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f5;
            flex-shrink: 0;
        }

        #navbar h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #111;
        }

        #agent_name {
            font-size: 0.82rem;
            color: #888;
            background: #f4f4f8;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .msg-block { display: flex; flex-direction: column; gap: 4px; }

        .msg-user-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: #888;
        }

        .msg-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #5b5fc7;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.7rem; font-weight: 700;
        }

        .msg-avatar.agent { background: linear-gradient(135deg, #5b5fc7, #a78bfa); }

        .msg-text {
            font-size: 0.92rem;
            color: #222;
            line-height: 1.65;
            padding-left: 36px;
        }

        .msg-text.user-msg {
            color: #555;
        }

        /* ── Input bar ── */
        #input-bar {
            padding: 12px 48px 20px;
            flex-shrink: 0;
        }

        /* System prompt panel (hidden by default) */
        #system-prompt-panel {
            display: none;
            background: #f7f7fb;
            border: 1px solid #e0e0ee;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
        }

        #system-prompt-panel.visible { display: block; }

        #system-prompt-panel textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.85rem;
            color: #333;
            resize: none;
            height: 60px;
        }

        #system-prompt-panel label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        /* Input box */
        #user_message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f4f4f8;
            border-radius: 20px;
            border: 1.5px solid #e8e8f0;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

        #user_message:focus-within {
            border-color: #5b5fc7;
            background: white;
        }

        #settings-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #999;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        #settings-btn:hover { background: #ebebf5; color: #5b5fc7; }

        #input_message { flex: 1; }

        #user_write {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.92rem;
            color: #222;
            resize: none;
            height: 24px;
            line-height: 1.5;
        }

        #user_write::placeholder { color: #bbb; }

        #send-btn {
            background: #5b5fc7;
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
        }

        #send-btn:hover { background: #4a4eb8; transform: scale(1.05); }
        #send-btn:active { transform: scale(0.95); }
        #hamburger {
            display: none;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #111;
        }

        @media (max-width: 768px) {
            #hamburger { display: block; }
            #sidebar { 
                position: absolute;
                left: -260px;
                height: 100%;
                z-index: 100;
                transition: left 0.3s ease;
            }
            #sidebar.open { left: 0; }
            #app { position: relative; overflow: hidden; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div id="sidebar-title">AgentBuilder</div>
        <button id="new-chat-btn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New chat
        </button>
        <div class="sidebar-section-label">Your conversations</div>
        <div id="history-list">
            <!-- JS popula aquí -->
        </div>
    </div>

    <!-- Chat section -->
    <div id="chat-section">

        <!-- Navbar -->
        <div id="navbar">
            <div style="display:flex; align-items:center; gap:12px;">
            <button id="hamburger" onclick="toggleSidebar()">&#9776;</button>
            <h1>AgentBuilder</h1>
        </div>
            <div id="tittle_context">
                <!-- JS popula aquí -->
            </div>
            <div id="agent_name">Agent: default</div>
        </div>
        <!-- Messages -->
        <div id="messages">
            <!-- JS popula aquí -->
        </div>

        <!-- Input bar -->
        <div id="input-bar">
            <!-- System prompt panel (toggle) -->
            <div id="system-prompt-panel">
                <label>System Prompt</label>
                <textarea id="system_prompt" placeholder="Define how the agent behaves..."></textarea>
            </div>

            <div id="user_message">
                <!-- Botón flecha arriba = toggle system prompt -->
                <button id="settings-btn" type="button" onclick="toggleSystemPrompt()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="m19 15-7-6-7 6"/>
                    </svg>
                </button>

                <div id="input_message">
                    <textarea id="user_write" placeholder="What's in your mind?..." onkeydown="handleKey(event)"></textarea>
                </div>

                <button id="send-btn" type="button" onclick="sendAgent()">
                    <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="m12 4.5 5 5m-5-5-5 5m5-5v10c0 1.667-1 5-5 5"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>
</div>

<script src="../static/js/agent.js"></script>
</body>
</html>
